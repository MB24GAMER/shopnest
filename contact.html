<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | ShopNest</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar (simplified) -->
    <header>
        <div class="container d-flex justify-between align-center" style="height: 80px;">
            <a href="index.html" class="logo"><i class="fa-solid fa-bag-shopping"></i> ShopNest</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="contact.html" class="active" style="color: var(--primary);">Contact</a></li>
            </ul>
        </div>
    </header>

    <main class="container">
        <div style="text-align: center; margin-top: 5rem; margin-bottom: 5rem;">
            <h1 style="font-size: 3.5rem; font-weight: 900; margin-bottom: 1rem;">Get In Touch</h1>
            <p style="font-size: 1.125rem; color: var(--gray-400);">Any questions? We'd love to hear from you!</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 4rem; margin-bottom: 5rem;">
            <!-- Contact Info -->
            <div style="background: var(--white); padding: 3rem; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); height: fit-content;">
                <h3 style="font-weight: 800; margin-bottom: 2rem;">Contact Information</h3>
                <div style="display: flex; gap: 1.5rem; margin-bottom: 2rem;">
                    <span style="width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-location-dot"></i></span>
                    <div>
                        <h4 style="font-weight: 700;">Location</h4>
                        <p style="color: var(--gray-400); font-size: 0.875rem;">123 Metro Avenue, Tech District, India</p>
                    </div>
                </div>
                <div style="display: flex; gap: 1.5rem; margin-bottom: 2rem;">
                    <span style="width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-phone"></i></span>
                    <div>
                        <h4 style="font-weight: 700;">Phone</h4>
                        <p style="color: var(--gray-400); font-size: 0.875rem;">+91 98765 43210</p>
                    </div>
                </div>
                <div style="display: flex; gap: 1.5rem; margin-bottom: 2rem;">
                    <span style="width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-envelope"></i></span>
                    <div>
                        <h4 style="font-weight: 700;">Email</h4>
                        <p style="color: var(--gray-400); font-size: 0.875rem;">support@shopnest.com</p>
                    </div>
                </div>

                <div style="border-top: 1px solid var(--gray-100); padding-top: 2rem; margin-top: 2rem;">
                    <h4 style="font-weight: 700; margin-bottom: 1.5rem;">Follow Us</h4>
                    <div style="display: flex; gap: 1rem;">
                        <span style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--gray-200); color: var(--gray-800); display: flex; align-items: center; justify-content: center;"><i class="fa-brands fa-facebook-f"></i></span>
                        <span style="width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--gray-200); color: var(--gray-800); display: flex; align-items: center; justify-content: center;"><i class="fa-brands fa-linkedin-in"></i></span>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div style="background: var(--white); padding: 3rem; border-radius: var(--radius-md); box-shadow: var(--shadow-sm);">
                <form onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                        <input type="text" placeholder="Full Name" style="width: 100%;" required>
                        <input type="email" placeholder="Email Address" style="width: 100%;" required>
                    </div>
                    <input type="text" placeholder="Subject" style="width: 100%; margin-bottom: 1.5rem;" required>
                    <textarea placeholder="Your Message" style="width: 100%; min-height: 150px; padding: 1rem; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); margin-bottom: 2rem;" required></textarea>
                    <button type="submit" class="btn-primary" style="width: 100%; padding: 1rem;">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer same as index.html -->
    <footer style="margin-top: 5rem;">
        <div class="container"><div class="footer-bottom">&copy; 2024 ShopNest. All Rights Reserved.</div></div>
    </footer>
</body>
</html>
