<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | ShopNest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-page { background: white; padding: 1rem; margin-top: 10px; display: grid; grid-template-columns: 450px 1fr; gap: 2rem; max-width: 1248px; margin: 10px auto; box-shadow: var(--shadow); min-height: 80vh; }
        .gallery-container { position: sticky; top: 130px; }
        .main-image { width: 100%; height: 480px; border: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .main-image img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .gallery-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-cart { background: #ff9f00; color: white; flex: 1; padding: 18px; font-weight: 700; border: none; cursor: pointer; border-radius: 2px; font-size: 1.1rem; }
        .btn-buy { background: #fb641b; color: white; flex: 1; padding: 18px; font-weight: 700; border: none; cursor: pointer; border-radius: 2px; font-size: 1.1rem; }
        .product-info-panel h1 { font-size: 1.25rem; font-weight: 400; line-height: 1.4; margin-bottom: 15px; }
        .rating-badge { background: #388e3c; color: white; padding: 2px 8px; border-radius: 3px; font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
        .reviews-text { color: #878787; font-size: 0.95rem; margin-left: 10px; font-weight: 500; }
        .price-section { margin: 15px 0; display: flex; align-items: flex-end; gap: 12px; }
        .current-price { font-size: 2rem; font-weight: 700; }
        .original-price { text-decoration: line-through; color: #878787; margin-bottom: 5px; font-size: 1.1rem; }
        .discount-text { color: #388e3c; font-weight: 700; margin-bottom: 5px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <header>
        <div class="header-main-row">
            <a href="index.html" class="logo" style="color: #2874f0; font-size: 1.25rem; font-weight: 700; text-decoration: none;">ShopNest</a>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search for Products, Brands and More">
            </div>
            <div class="nav-actions">
                <a href="login.html" class="login-dropdown"><i class="fa-regular fa-circle-user"></i> <span>Login</span></a>
                <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i> Cart</a>
            </div>
        </div>
    </header>

    <main id="product-page-content"></main>

    <script src="js/products.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const idValue = params.get('id') || params.get('productId') || params.get('pid') || localStorage.getItem('shopnest_last_product_id');
            const product = getProductById(idValue);
            
            const container = document.getElementById('product-page-content');
            
            if (product) {
                localStorage.setItem('shopnest_last_product_id', String(product.id));
                container.className = 'product-page';
                const discount = Math.round(((product.originalPrice - product.price) / product.originalPrice) * 100);
                container.innerHTML = `
                    <div class="gallery-container">
                        <div class="main-image"><img src="${product.image}"></div>
                        <div class="gallery-actions">
                            <button class="btn-cart" onclick="addToCart('${product.id}', event); setTimeout(() => window.location.href='cart.html', 300);"><i class="fa-solid fa-cart-shopping"></i> ADD TO CART</button>
                            <button class="btn-buy" onclick="window.location.href='checkout.html?id=${product.id}'"><i class="fa-solid fa-bolt"></i> BUY NOW</button>
                        </div>
                    </div>
                    <div class="product-info-panel">
                        <p style="color: #878787; font-size: 0.85rem; margin-bottom: 8px;">${product.category} > ${product.name}</p>
                        <h1>${product.name}</h1>
                        <div style="display: flex; align-items: center; margin-bottom: 15px;">
                            <span class="rating-badge">${product.rating} <i class="fa-solid fa-star" style="font-size: 0.7rem;"></i></span>
                            <span class="reviews-text">${product.reviews.toLocaleString()} Ratings & Reviews</span>
                        </div>
                        <p style="color: #388e3c; font-weight: 700; font-size: 1rem;">Special Price</p>
                        <div class="price-section">
                            <span class="current-price">₹${product.price.toLocaleString()}</span>
                            <span class="original-price">₹${product.originalPrice.toLocaleString()}</span>
                            <span class="discount-text">${discount}% off</span>
                        </div>
                        <div style="margin-top: 30px;"><h3 style="font-size: 1.15rem; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">Product Description</h3><p style="line-height: 1.6; font-size: 0.95rem;">${product.description}</p></div>
                        <div style="margin-top: 30px;"><h3 style="font-size: 1.15rem; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">Specifications</h3>
                            <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                                ${product.specs.map(spec => `<tr style="border-bottom: 1px solid #f0f0f0;"><td style="padding: 12px 0; color: #878787; width: 25%;">${spec.split(':')[0]}</td><td style="padding: 12px 0; font-weight: 500;">${spec.split(':')[1] || 'General'}</td></tr>`).join('')}
                            </table>
                        </div>
                    </div>
                `;
                document.title = product.name + " | ShopNest";
            } else {
                container.innerHTML = `<div style="text-align:center; padding: 100px;"><h2>Product Not Found</h2><a href="index.html" style="background: #2874f0; color: white; padding: 10px 25px; border-radius: 4px; text-decoration: none;">Back to Home</a></div>`;
            }
        });
    </script>
</body>
</html>
