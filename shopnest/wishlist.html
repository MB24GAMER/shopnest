<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist | ShopNest</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <header>
        <div class="header-main-row">
            <a href="index.html" class="logo" style="color: #2874f0; font-size: 1.25rem; font-weight: 700; text-decoration: none;">ShopNest</a>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search for Products, Brands and More">
            </div>
            <div class="nav-actions">
                <a href="profile.html" class="login-dropdown" style="color: inherit; text-decoration: none; font-weight: 600;">
                    <i class="fa-regular fa-circle-user"></i> <span>Profile</span>
                </a>
                <a href="wishlist.html" style="color: inherit; text-decoration: none; font-weight: 600;">
                    <i class="fa-regular fa-heart"></i> Wishlist
                </a>
                <a href="cart.html" style="color: inherit; text-decoration: none; font-weight: 600;">
                    <i class="fa-solid fa-cart-shopping"></i> Cart
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <h1 style="margin-top: 3rem; font-size: 2.5rem; font-weight: 800;">My Favorites</h1>
        
        <div id="wishlist-grid" class="products-grid" style="margin-top: 3rem;">
            <!-- Rendered via JS -->
        </div>

        <div id="empty-wishlist" style="display: none; text-align: center; padding: 8rem 0;">
            <i class="fa-regular fa-heart" style="font-size: 4rem; color: var(--gray-200); margin-bottom: 2rem;"></i>
            <h2 style="font-size: 2rem; font-weight: 800;">Your Wishlist is Empty</h2>
            <p style="color: var(--gray-400); margin-bottom: 2.5rem;">Save your favorite items here to view them later.</p>
            <a href="products.html" class="btn-primary">Explore Products</a>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/products.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderWishlistPage();
        });

        function renderWishlistPage() {
            const grid = document.getElementById('wishlist-grid');
            const empty = document.getElementById('empty-wishlist');

            if (wishlist.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            empty.style.display = 'none';

            // Filter products that are in the wishlist array
            const wishlistProducts = products.filter(p => wishlist.includes(p.id));
            grid.innerHTML = wishlistProducts.map(p => createProductCard(p)).join('');
        }

        // Override toggleWishlist behavior for this page
        const originalToggle = toggleWishlist;
        toggleWishlist = function(productId) {
            originalToggle(productId);
            renderWishlistPage();
        }
    </script>
</body>
</html>
