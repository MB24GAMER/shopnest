<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | ShopNest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-layout { display: grid; grid-template-columns: 1fr 380px; gap: 20px; background: #f1f3f6; padding: 20px 0; min-height: 80vh; }
        .cart-items-container { background: #fff; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.1); border-radius: 2px; }
        .cart-title { padding: 15px 24px; border-bottom: 1px solid #f0f0f0; font-size: 1.1rem; font-weight: 600; }
        .cart-item { display: flex; padding: 24px; border-bottom: 1px solid #f0f0f0; gap: 24px; }
        .cart-item-img { width: 112px; height: 112px; object-fit: contain; }
        .cart-item-info { flex: 1; }
        .cart-item-info h4 { font-size: 1rem; margin-bottom: 8px; font-weight: 500; }
        .cart-item-info .seller { color: #878787; font-size: 0.85rem; margin-bottom: 15px; }
        .cart-item-prices { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .cart-item-prices .curr { font-size: 1.15rem; font-weight: 700; }
        .cart-item-prices .orig { text-decoration: line-through; color: #878787; font-size: 0.9rem; }
        .cart-item-prices .disc { color: #388e3c; font-weight: 700; font-size: 0.9rem; }
        
        .price-details { background: #fff; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.1); border-radius: 2px; height: fit-content; position: sticky; top: 130px; }
        .price-header { padding: 13px 24px; border-bottom: 1px solid #f0f0f0; color: #878787; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; }
        .price-body { padding: 24px; border-bottom: 1px dashed #f0f0f0; }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 1rem; }
        .price-total { display: flex; justify-content: space-between; padding: 24px; font-size: 1.15rem; font-weight: 700; border-bottom: 1px dashed #f0f0f0; }
        .price-savings { padding: 12px 24px; color: #388e3c; font-weight: 700; font-size: 0.95rem; }
        
        .place-order-row { background: #fff; padding: 16px 22px; box-shadow: 0 -2px 10px 0 rgba(0,0,0,0.1); position: sticky; bottom: 0; display: flex; justify-content: flex-end; }
        .place-order-btn { background: #fb641b; color: #fff; padding: 16px 60px; font-weight: 700; border-radius: 2px; text-decoration: none; font-size: 1rem; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <header>
        <div class="header-main-row">
            <a href="index.html" class="logo" style="color: #2874f0; font-size: 1.25rem; font-weight: 700; text-decoration: none;">ShopNest</a>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search for Products, Brands and More">
            </div>
            <div class="nav-actions">
                <a href="login.html" class="login-dropdown">
                    <i class="fa-regular fa-circle-user"></i>
                    <span>Login</span>
                </a>
                <a href="cart.html" class="active"><i class="fa-solid fa-cart-shopping"></i> Cart</a>
            </div>
        </div>
    </header>

    <div class="cart-layout container">
        <div id="cart-items-section">
            <div class="cart-items-container">
                <div class="cart-title">ShopNest (1)</div>
                <div id="cart-list">
                    <!-- Dynamic -->
                </div>
            </div>
            <div class="place-order-row">
                <a href="checkout.html" class="place-order-btn">PLACE ORDER</a>
            </div>
        </div>

        <aside class="price-details">
            <div class="price-header">Price Details</div>
            <div class="price-body">
                <div class="price-row">
                    <span>Price (1 item)</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="price-row">
                    <span>Discount</span>
                    <span id="discount" style="color: #388e3c;">- ₹0</span>
                </div>
                <div class="price-row">
                    <span>Delivery Charges</span>
                    <span style="color: #388e3c;">FREE</span>
                </div>
            </div>
            <div class="price-total">
                <span>Total Amount</span>
                <span id="total-amount">₹0</span>
            </div>
            <div class="price-savings">
                You will save <span id="savings-amount">₹0</span> on this order
            </div>
        </aside>
    </div>

    <script src="js/products.js"></script>
    <script src="js/script.js"></script>
    <script>
        function renderCart() {
            const list = document.getElementById('cart-list');
            
            if (cart.length === 0) {
                list.innerHTML = '<div style="padding: 40px; text-align: center;"><h3>Your cart is empty!</h3><p style="margin-top: 10px;"><a href="index.html" style="color: #2874f0; text-decoration: none; font-weight: 600;">Shop now</a></p></div>';
                document.getElementById('subtotal').innerText = '₹0';
                document.getElementById('discount').innerText = '- ₹0';
                document.getElementById('total-amount').innerText = '₹0';
                document.getElementById('savings-amount').innerText = '₹0';
                document.querySelector('.cart-title').innerText = 'Cart (0)';
                document.querySelector('.place-order-row').style.display = 'none';
                return;
            } else {
                document.querySelector('.place-order-row').style.display = 'flex';
            }

            let totalOrig = 0;
            let totalCurr = 0;
            let totalQty = 0;

            list.innerHTML = cart.map(item => {
                const product = getProductById(item.id);
                if (!product) return '';
                
                totalOrig += product.originalPrice * item.quantity;
                totalCurr += product.price * item.quantity;
                totalQty += item.quantity;

                return `
                    <div class="cart-item" id="cart-item-${product.id}">
                        <img src="${product.image}" class="cart-item-img">
                        <div class="cart-item-info">
                            <h4>${product.name}</h4>
                            <div class="seller">Seller: RetailNet</div>
                            <div class="cart-item-prices">
                                <span class="curr">₹${product.price.toLocaleString()}</span>
                                <span class="orig">₹${product.originalPrice.toLocaleString()}</span>
                                <span class="disc">${Math.round((1 - product.price/product.originalPrice)*100)}% Off</span>
                            </div>
                            <div style="display:flex; align-items: center; gap: 20px; font-weight: 700; font-size: 0.9rem;">
                                <div style="display:flex; align-items:center; gap: 10px;">
                                    <button onclick="updateCartAndRender(${product.id}, -1)" style="width: 28px; height: 28px; border-radius: 50%; border: 1px solid #c2c2c2; background: white; cursor: pointer;">-</button>
                                    <span style="font-size: 1rem; border: 1px solid #c2c2c2; padding: 2px 12px; border-radius: 2px;">${item.quantity}</span>
                                    <button onclick="updateCartAndRender(${product.id}, 1)" style="width: 28px; height: 28px; border-radius: 50%; border: 1px solid #c2c2c2; background: white; cursor: pointer;">+</button>
                                </div>
                                <a href="#" onclick="removeItemAndRender(${product.id}, event)" style="text-decoration:none; color: #212121;">REMOVE</a>
                            </div>
                        </div>
                        <div style="font-size: 0.85rem; color: #212121;">
                            Delivery by Tue Oct 15 | <span style="color: #388e3c;">Free</span>
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelector('.cart-title').innerText = `ShopNest (${totalQty})`;
            document.getElementById('subtotal').innerText = '₹' + totalOrig.toLocaleString();
            document.getElementById('discount').innerText = '- ₹' + (totalOrig - totalCurr).toLocaleString();
            document.getElementById('total-amount').innerText = '₹' + totalCurr.toLocaleString();
            document.getElementById('savings-amount').innerText = '₹' + (totalOrig - totalCurr).toLocaleString();
        }

        window.updateCartAndRender = function(id, delta) {
            updateQuantity(id, delta);
            renderCart();
        };

        window.removeItemAndRender = function(id, event) {
            if (event) event.preventDefault();
            removeFromCart(id);
            renderCart();
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
        });
    </script>
</body>
</html>
