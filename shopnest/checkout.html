<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | ShopNest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .checkout-layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 8rem;
            padding: 8rem 0;
            min-height: 80vh;
        }

        .checkout-header { padding: 4rem 0; text-align: center; }
        .checkout-header h1 { font-size: 3.5rem; margin-bottom: 1rem; }
        .checkout-header p { color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; }

        .checkout-section { margin-bottom: 6rem; }
        .section-number {
            font-family: 'Marcellus', serif; font-size: 1.2rem; color: var(--accent);
            display: inline-block; margin-bottom: 1.5rem; border-bottom: 2px solid var(--accent);
            padding-bottom: 0.5rem;
        }
        .checkout-section h2 { font-size: 2.2rem; margin-bottom: 3rem; }

        .form-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem;
        }
        .form-group { display: flex; flex-direction: column; gap: 0.8rem; }
        .form-group.full { grid-column: span 2; }
        
        .form-group label { text-transform: uppercase; font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; opacity: 0.8; }
        
        input {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 1.2rem 1.5rem; border-radius: 0.8rem; color: var(--text);
            font-family: 'Outfit', sans-serif; font-size: 1rem; transition: var(--transition);
        }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 15px var(--accent-glow); }

        .payment-method {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 2.5rem; border-radius: 1.5rem; display: flex; align-items: center; gap: 2rem;
            cursor: pointer; transition: var(--transition);
        }
        .payment-method:hover { border-color: var(--accent); }
        .payment-method.active { border-color: var(--accent); background: rgba(196, 164, 132, 0.05); }

        .order-summary-card {
            background: var(--card-bg); padding: 4rem; border-radius: 2rem;
            position: sticky; top: 150px; box-shadow: var(--shadow);
        }
        .order-summary-card h3 { font-size: 2rem; margin-bottom: 3rem; }

        .summary-item {
            display: flex; gap: 2rem; align-items: center; margin-bottom: 2.5rem;
        }
        .summary-img { width: 80px; height: 80px; border-radius: 0.8rem; overflow: hidden; background: white; }
        .summary-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .summary-info h4 { font-size: 1.1rem; margin-bottom: 0.3rem; }
        .summary-info p { font-size: 0.9rem; color: var(--text-muted); }

        .total-box { margin-top: 3rem; border-top: 1px solid var(--border); padding-top: 3rem; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-size: 1.1rem; }
        .final-total { font-size: 1.8rem; font-weight: 700; color: var(--text); margin-top: 2rem; }

        @media (max-width: 1100px) { .checkout-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">ShopNest</a>
            <p style="letter-spacing: 3px; font-weight: 700; font-size: 0.7rem; color: var(--accent); text-transform: uppercase;"><i class="fa-solid fa-lock" style="margin-right: 10px;"></i> Secure Acquisition</p>
            <div class="nav-actions">
                <a href="cart.html" class="action-icon"><i class="fa-solid fa-arrow-left"></i></a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="checkout-header reveal">
            <h1>Complete Your Collection</h1>
            <p>Every detail attended to with care.</p>
        </div>

        <form id="checkout-form" class="checkout-layout">
            <div class="main-checkout-form">
                <section class="checkout-section reveal">
                    <span class="section-number">01</span>
                    <h2>Shipping Logistics</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" placeholder="e.g. Alexander" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" placeholder="e.g. Thorne" required>
                        </div>
                        <div class="form-group full">
                            <label>Email Address</label>
                            <input type="email" placeholder="alexander@example.com" required>
                        </div>
                        <div class="form-group full">
                            <label>Full Street Address</label>
                            <input type="text" placeholder="123 Luxury Lane, Heritage District" required>
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" placeholder="New Delhi" required>
                        </div>
                        <div class="form-group">
                            <label>Pincode</label>
                            <input type="text" placeholder="110001" required>
                        </div>
                    </div>
                </section>

                <section class="checkout-section reveal">
                    <span class="section-number">02</span>
                    <h2>Method of Payment</h2>
                    <div class="payment-method active">
                        <div style="width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center;">
                            <div style="width: 12px; height: 12px; border-radius: 50%; background: var(--accent);"></div>
                        </div>
                        <i class="fa-solid fa-truck-fast" style="font-size: 1.8rem;"></i>
                        <div>
                            <h4 style="font-size: 1.2rem; font-family: 'Marcellus', serif; margin-bottom: 0.3rem;">Cash on Delivery</h4>
                            <p style="font-size: 0.9rem; color: var(--text-muted);">Settle your acquisition upon arrival.</p>
                        </div>
                    </div>
                </section>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 2.5rem; font-size: 1rem;">Finalize Order</button>
            </div>

            <aside class="order-summary-sidebar reveal">
                <div class="order-summary-card">
                    <h3>Summary</h3>
                    <div id="checkout-items">
                        <!-- Dynamic Checkout Items -->
                    </div>
                    
                    <div class="total-box">
                        <div class="total-row">
                            <span>Subtotal</span>
                            <span id="subtotal">₹0</span>
                        </div>
                        <div class="total-row">
                            <span>Shipping</span>
                            <span id="shipping">COMPLIMENTARY</span>
                        </div>
                        <div class="total-row">
                            <span>GST (Tax Recovery)</span>
                            <span id="tax">₹0</span>
                        </div>
                        <div class="total-row final-total">
                            <span>Total</span>
                            <span id="total">₹0</span>
                        </div>
                    </div>
                    
                    <p style="text-align: center; margin-top: 3rem; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px;">
                        <i class="fa-solid fa-shield-halved" style="margin-right: 8px;"></i> Encrypted SSL Security
                    </p>
                </div>
            </aside>
        </form>
    </main>

    <script src="js/products.js"></script>
    <script src="js/script.js"></script>
    <script>
        let checkoutItems = [];

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            
            const params = new URLSearchParams(window.location.search);
            const directId = params.get('id');
            
            if (directId) {
                const product = getProductById(directId);
                if (product) {
                    checkoutItems = [{...product, quantity: 1}];
                } else {
                    checkoutItems = cart;
                }
            } else {
                checkoutItems = cart;
            }

            renderCheckout();

            document.getElementById('checkout-form').addEventListener('submit', (e) => {
                e.preventDefault();
                // Clear cart if not direct checkout
                if (!directId) {
                    cart = [];
                    localStorage.setItem('shopnest_cart', '[]');
                }
                alert('Thank you for your acquisition. ShopNest will handcraft your delivery.');
                window.location.href = 'order-success.html';
            });
        });

        function renderCheckout() {
            const container = document.getElementById('checkout-items');
            if (checkoutItems.length === 0) {
                window.location.href = 'products.html';
                return;
            }

            let subtotal = checkoutItems.reduce((acc, item) => acc + (item.price * item.quantity), 0);
            let tax = Math.round(subtotal * 0.18);
            let shipping = subtotal > 5000 ? 0 : 250;
            let total = subtotal + shipping + tax;

            document.getElementById('subtotal').textContent = `₹${subtotal.toLocaleString()}`;
            document.getElementById('tax').textContent = `₹${tax.toLocaleString()}`;
            document.getElementById('total').textContent = `₹${total.toLocaleString()}`;
            document.getElementById('shipping').textContent = shipping === 0 ? 'COMPLIMENTARY' : `₹${shipping.toLocaleString()}`;

            container.innerHTML = checkoutItems.map(item => `
                <div class="summary-item">
                    <div class="summary-img">
                        <img src="${item.image}" alt="${item.name}">
                    </div>
                    <div class="summary-info">
                        <h4>${item.name}</h4>
                        <p>${item.quantity} × ₹${item.price.toLocaleString()}</p>
                    </div>
                    <div style="margin-left: auto; font-weight: 700;">₹${(item.price * item.quantity).toLocaleString()}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
