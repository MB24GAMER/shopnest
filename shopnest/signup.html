<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Collection | ShopNest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
        }

        .auth-visual {
            background: url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=1500');
            background-size: cover;
            background-position: center;
        }

        .auth-content {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem;
            background: var(--bg);
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
        }

        .auth-card h1 { font-size: 3.5rem; margin-bottom: 1rem; }
        .auth-card p { color: var(--text-muted); margin-bottom: 4rem; font-size: 1.1rem; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2.5rem; }
        .form-group { margin-bottom: 2.5rem; }
        .form-group label { display: block; text-transform: uppercase; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; margin-bottom: 1rem; opacity: 0.7; }
        
        input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.2rem 1.5rem;
            border-radius: 0.8rem;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 15px var(--accent-glow); }

        .auth-footer { margin-top: 4rem; text-align: center; border-top: 1px solid var(--border); padding-top: 3rem; }
        .auth-footer a { color: var(--accent); font-weight: 700; text-decoration: none; }

        @media (max-width: 1000px) {
            .auth-wrapper { grid-template-columns: 1fr; }
            .auth-visual { display: none; }
            .auth-content { padding: 4rem 2rem; }
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-visual"></div>
        <div class="auth-content">
            <div class="auth-card reveal active">
                <a href="index.html" class="logo" style="margin-bottom: 4rem; display: inline-block;">ShopNest</a>
                <h1>Become a Member</h1>
                <p>Gain early access to collections and bespoke narratives.</p>

                <form id="signup-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" id="fname" placeholder="Alexander" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" id="lname" placeholder="Thorne" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="alexander@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Create Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 2.5rem;">Create Account</button>
                </form>

                <div class="auth-footer">
                    <p>Already a member? <a href="login.html">Sign in here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const fname = document.getElementById('fname').value;
            const lname = document.getElementById('lname').value;
            const email = document.getElementById('email').value;
            
            // Simulation
            const user = {
                name: `${fname} ${lname}`,
                email: email,
                role: "Elite Member",
                joined: new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
            };
            
            localStorage.setItem('shopnest_user', JSON.stringify(user));
            
            // Anim
            document.querySelector('.auth-card').style.opacity = '0';
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 800);
        });
    </script>
</body>
</html>
